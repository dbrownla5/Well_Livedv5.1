kind = "web"
previewPath = "/"
title = "The Well Lived Citizen"
version = "1.0.0"
id = "artifacts/wlc-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20784

[services.development]
run = "pnpm --filter @workspace/wlc-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wlc-site", "run", "build" ]
publicDir = "artifacts/wlc-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20784"
BASE_PATH = "/"
